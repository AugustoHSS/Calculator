<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculator</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="calculator-container">
        <div class="calculator-display"></div>
        <div class="calculator-grid">
            <button class="eraser-button">AC</button>
            <button class="eraser-button">C</button>
            <button class="operation-button">/</button>
            <button class="operation-button">*</button>

            <button class="numeric-button">7</button>
            <button class="numeric-button">8</button>
            <button class="numeric-button">9</button>
            <button class="operation-button">-</button>

            <button class="numeric-button">4</button>
            <button class="numeric-button">5</button>
            <button class="numeric-button">6</button>
            <button class="operation-button">+</button>

            <button class="numeric-button">1</button>
            <button class="numeric-button">2</button>
            <button class="numeric-button">3</button>
            <button class="button-equal operation-button">=</button>

            <button class="button-zero numeric-button">0</button>
            <button class="numeric-button">.</button>
        </div>
    </div>
</body>
<script src="javascript.js"></script>
</html>
